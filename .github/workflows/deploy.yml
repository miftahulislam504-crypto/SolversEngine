name: Deploy Solver to Railway

# main branch-এ push হলেই এটা চলবে এবং Railway-তে নতুন deployment ট্রিগার করবে।
# এটা কাজ করার আগে GitHub repo Settings → Secrets and variables → Actions এ
# নিচের secret যোগ করতে হবে (README.md এ পুরো নির্দেশনা আছে):
#   RAILWAY_TOKEN

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service civilos-structural-solver --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
